{% extends 'base.html' %}
{% block content %}
<div class="form-container">
    <h2>비밀번호 재설정</h2>
    <form method="POST">
        <div class="form-group">
            <label>새 비밀번호</label>
            <div class="password-wrapper">
                <input type="password" name="new_password" id="new_password" placeholder="새 비밀번호" required>
                <button type="button" class="toggle-password" onclick="togglePassword('new_password')">👁</button>
            </div>
        </div>
        <div class="form-group">
            <label>새 비밀번호 확인</label>
            <div class="password-wrapper">
                <input type="password" name="new_password2" id="new_password2" placeholder="새 비밀번호 재입력" required>
                <button type="button" class="toggle-password" onclick="togglePassword('new_password2')">👁</button>
            </div>
        </div>
        <button type="submit" class="btn btn-primary btn-full">비밀번호 변경</button>
    </form>
</div>
{% endblock %}
