{% extends 'base.html' %}
{% block content %}
<div class="form-container">
    <h2>비밀번호 찾기</h2>
    <p>등록한 이메일 주소를 입력하시면 비밀번호 재설정 링크를 보내드립니다.</p>
    <form method="POST">
        <div class="form-group">
            <label>이메일</label>
            <input type="email" name="email" placeholder="가입 시 등록한 이메일" required>
        </div>
        <button type="submit" class="btn btn-primary btn-full">재설정 링크 발송</button>
    </form>
    <p class="form-footer"><a href="{{ url_for('login') }}">← 로그인으로</a></p>
</div>
{% endblock %}
