{% extends 'base.html' %}
{% block content %}
<div class="form-container">
    <h2>충전 요청 수정</h2>
    <form method="POST">
        <div class="form-group">
            <label>충전 금액 (원)</label>
            <input type="number" name="amount" min="1000" step="1000" value="{{ req.amount }}" required>
        </div>
        <div class="form-group">
            <label>입금 날짜</label>
            <input type="date" name="deposit_date" value="{{ req.deposit_date.strftime('%Y-%m-%d') }}" required>
        </div>
        <button type="submit" class="btn btn-primary btn-full">수정 완료</button>
    </form>
    <p class="form-footer"><a href="{{ url_for('dashboard') }}">← 취소</a></p>
</div>
{% endblock %}
