{% extends 'base.html' %}
{% block content %}
<div class="form-container">
    <h2>충전 요청</h2>

    <div class="info-box">
        <p><strong>입금자명:</strong> {{ current_user.depositor_name }}</p>
        <p>아래 학교 계좌로 입금자명을 사용하여 입금 후 요청해주세요.</p>
        <p><strong>은행명:</strong> 농협 &nbsp;|&nbsp; <strong>계좌번호:</strong> 20717052167859 &nbsp;|&nbsp; <strong>예금주:</strong> 이정우</p>
    </div>

    <form method="POST">
        <div class="form-group">
            <label>충전 금액 (원)</label>
            <input type="number" name="amount" min="1000" step="1000" placeholder="ex) 10000" required>
            <small>최소 1,000원 이상</small>
        </div>
        <div class="form-group">
            <label>입금 날짜</label>
            <input type="date" name="deposit_date" required>
        </div>
        <button type="submit" class="btn btn-primary btn-full">충전 요청 등록</button>
    </form>
    <p class="form-footer"><a href="{{ url_for('dashboard') }}">← 내 충전 내역으로</a></p>
</div>
{% endblock %}
